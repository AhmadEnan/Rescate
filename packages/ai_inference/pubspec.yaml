name: ai_inference
description: Module 1 - Local LLM Execution (llama.cpp via flutter_llama, GGUF models)
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.11.4
  flutter: ">=3.19.0"

dependencies:
  dev_profiler:
    path: ../dev_profiler
  flutter:
    sdk: flutter
  # llama.cpp Flutter binding — GGUF inference on Android (Vulkan/OpenCL) & iOS (Metal)
  llamadart: ^0.6.12
  # Required for resolving app document/cache directory paths
  path_provider: ^2.1.4

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

resolution: workspace
