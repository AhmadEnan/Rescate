name: rag_engine
description: >
  Module 6 — Offline Vectorized RAG (Retrieval-Augmented Generation).
  Parses PDF/DOCX/TXT/HTML/MD documents, orchestrates chunking and embedding
  via mobile_rag_engine, and persists vectors in offline_data.VectorStore.
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.11.4
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # ── RAG ML core (chunking, tokenisation, ONNX embedding, HNSW+BM25 search)
  mobile_rag_engine: ^0.17.0

  # ── Shared vector database (Float32List BLOB, cosine scan, IVF index)
  offline_data:
    path: ../offline_data

  # ── Document parsers ─────────────────────────────────────────────────────
  pdfrx: ^1.0.71              # PDF text extraction via PDFium (MIT)
  docx_to_text: ^1.0.1        # DOCX paragraph extraction
  archive: ^3.6.1             # DOCX ZIP fallback + raw XML extraction
  html: ^0.15.5               # HTML tag stripping

  # ── Utilities ────────────────────────────────────────────────────────────
  path_provider: ^2.1.4       # app documents dir (model copy)
  crypto: ^3.0.6              # SHA-256 for chunk deduplication
  uuid: ^4.5.1                # stable chunk IDs
  collection: ^1.19.1         # sorted collections

flutter:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  sqflite_common_ffi: ^2.3.4  # In-memory SQLite for pipeline tests

resolution: workspace
