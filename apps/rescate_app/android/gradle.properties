org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Fix: Project on F:\ and pub cache on C:\ causes Kotlin incremental compiler to crash
# when trying to compute cross-drive relative paths for its build cache.
kotlin.incremental=false
kotlin.daemon.jvm.options=--enable-native-access=ALL-UNNAMED
