name: rescate_app
description: Rescate Main Application containing the Feature-Based UI architecture.
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.11.4
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  
  lucide_icons: any
  google_fonts: ^6.2.1
  
  # Core Modular Packages (Local Dependencies)
  ai_inference:
    path: ../../packages/ai_inference
  audio_voice:
    path: ../../packages/audio_voice
  biometric_estimators:
    path: ../../packages/biometric_estimators
  bluetooth_mesh:
    path: ../../packages/bluetooth_mesh
  dev_profiler:
    path: ../../packages/dev_profiler
  offline_data:
    path: ../../packages/offline_data
  security_crypto:
    path: ../../packages/security_crypto
  flutter_animate: ^4.5.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  http: ^1.6.0
  sqflite: ^2.4.2
  sqflite_common_ffi_web: ^1.1.1
  shared_preferences: ^2.5.5
  geolocator: ^14.0.2
  sensors_plus: ^6.1.2
  flutter_map_tile_caching: ^9.0.1
  nearby_connections: ^4.3.0
  device_info_plus: ^11.0.0
  # Used by ModelSetupScreen to let the user pick their own .gguf model file
  file_picker: ^8.0.0

  sensor_availability:
    path: ../../packages/sensor_availability
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

resolution: workspace

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/logo.png
